# BertDiffused: BERT + MoE + Masked Diffusion Language Model
# Central configuration file

model:
  backbone: "bert-base-uncased"          # HuggingFace model ID
  hidden_size: 768
  num_layers: 12
  num_attention_heads: 12
  intermediate_size: 3072
  vocab_size: 30522
  max_seq_len: 128
  dropout: 0.1

  # Time conditioning
  use_time_conditioning: true
  time_embed_dim: 128                    # projected to hidden_size and added to token embeddings

  # Mixture-of-Experts (MoE) settings
  moe:
    enabled: true
    num_experts: 8                       # total number of feed-forward experts per MoE layer
    num_experts_per_token: 2             # top-k routing (sparse MoE)
    moe_layers: [3, 5, 7, 9, 11]        # which transformer layers to replace FFN with MoE
    router_z_loss_coef: 0.001           # auxiliary z-loss weight for router stability
    router_aux_loss_coef: 0.01          # auxiliary load-balancing loss coefficient
    expert_hidden_multiplier: 4          # each expert's inner dim = hidden_size * multiplier
    router_jitter: 0.01                  # noise added to router logits during training (exploration)
    use_expert_choice: false             # if true, experts pick tokens (alternative to token-choice top-k)

  # LoRA (Low-Rank Adaptation) — parameter-efficient fine-tuning
  lora:
    enabled: true                        # set false to train full BERT (no LoRA)
    rank: 8                              # low-rank dimension r (4–64 typical)
    alpha: 16.0                          # scaling factor α; effective scale = α/r
    dropout: 0.05                        # dropout on LoRA branch
    target_modules:                      # which attention projections to adapt
      - "query"
      - "key"
      - "value"

diffusion:
  noise_schedule: "log_linear"           # alpha_t = 1 - t
  num_inference_steps: 1000             # T for reverse diffusion at eval
  num_inference_steps_fast: 100         # T for fast eval runs
  time_eps: 1e-4                        # avoid t=0 singularity in 1/t weighting

training:
  dataset: "lm1b"                       # HuggingFace dataset ID
  dataset_split_train: "train"
  dataset_split_eval: "test"
  batch_size: 64                        # per-GPU batch size
  gradient_accumulation_steps: 8        # effective batch = 64*8 = 512
  max_steps: 100000                     # full run = 1M; 100K for student project
  warmup_steps: 2500
  learning_rate: 5.0e-5
  weight_decay: 0.01
  adam_beta1: 0.95
  adam_beta2: 0.999
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  fp16: true
  seed: 42
  save_steps: 5000
  eval_steps: 2500
  log_steps: 100
  output_dir: "checkpoints/bert_moe_diffusion"
  resume_from_checkpoint: null

# ETL pipeline settings
etl:
  output_dir: "data/processed"           # preprocessed Parquet shards
  min_text_length: 20                    # discard texts shorter than this (chars)
  max_text_length: 100000                # discard texts longer than this (chars)
  deduplicate: true                      # exact-hash deduplication
  num_proc: 4                            # parallel workers for .map()/.filter()
  shard_size: 50000                      # samples per Parquet shard
  max_samples: null                      # cap total samples (null = use all)

evaluation:
  num_eval_samples: 1024                # samples for gen PPL / MAUVE
  eval_batch_size: 32
  diffusion_steps_list: [10, 100, 1000] # sweep for quality-speed curve
  generative_ppl_model: "gpt2"         # external scorer for generated text
  mauve_max_text_length: 128
  bleu_n_gram: 4

# Baselines for comparison
baselines:
  autoregressive:
    - id: "gpt2"
      name: "GPT-2 (117M)"
    - id: "gpt2-medium"
      name: "GPT-2 Medium (345M)"
  diffusion:
    - id: "kuleshov-group/mdlm-owt"
      name: "MDLM-OWT (130M)"
    - id: "local"
      name: "BertDiffused-MoE (ours)"

# MLflow configuration
mlflow:
  tracking_uri: "mlruns"                  # local dir; or "http://localhost:5000" for server
  experiment_name: "BertMoEDiffusion"
  run_name: null                          # auto-generated if null
  registered_model_name: "BertMoEDiffusion"

  # Model serving settings (used by `mlflow models serve`)
  serving:
    host: "0.0.0.0"
    port: 8080
    workers: 2

  # Monitoring thresholds
  monitoring:
    max_bpd: 6.0
    max_latency_ms: 5000.0
    min_unique_ratio: 0.3
    drift_js_threshold: 0.1
